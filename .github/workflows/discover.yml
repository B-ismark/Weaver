name: Weaver auto-refresh

# D4 — scheduled discovery + Pinterest taste sync. Hits the deployed app's
# cron-guarded endpoints. Requires two repo secrets:
#   APP_URL      e.g. https://weaver.example.com   (no trailing slash)
#   CRON_SECRET  matches the app's CRON_SECRET env  (Bearer auth)

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h (00/06/12/18 UTC) — ~360 GH Actions min/mo, safe
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Normalize APP_URL (strip trailing slash)
        run: echo "APP_URL=${APP_URL%/}" >> "$GITHUB_ENV"

      - name: Pull new discovery candidates (one source per request)
        run: |
          # Each source is its own request so it fits Vercel's 60s function cap —
          # sweeping all of them in one POST times out (504) because embedding runs
          # on the free-CPU Space (cold start + per-image cost). A single slow or
          # walled source (reddit/artstation) must NOT fail the whole job, so we
          # capture the HTTP code and only warn.
          for s in arena openverse artic metmuseum wikimedia reddit artstation; do
            echo "== $s"
            code=$(curl -sSL -o /tmp/d.json -w "%{http_code}" -X POST "$APP_URL/api/discover" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"sources\":[\"$s\"]}" || echo "000")
            cat /tmp/d.json 2>/dev/null; echo " (HTTP $code)"
            [ "$code" = "200" ] || echo "  ! $s did not succeed (non-fatal)"
          done

      - name: Sync Pinterest saved pins (taste signal)
        run: |
          code=$(curl -sSL -o /tmp/sync.json -w "%{http_code}" -X POST "$APP_URL/api/pinterest/sync" \
            -H "Authorization: Bearer $CRON_SECRET")
          cat /tmp/sync.json; echo
          # 409 = Pinterest not connected yet → not a failure, just skip.
          if [ "$code" = "409" ]; then echo "Pinterest not connected — skipping"; exit 0; fi
          if [ "$code" -ge 400 ]; then echo "Pinterest sync failed (HTTP $code)"; exit 1; fi

      - name: Recompute taste centroids
        run: |
          # 422 when there aren't enough taste embeddings yet — tolerate it.
          curl -sSL -X POST "$APP_URL/api/recluster" | cat; echo
