name: Weaver auto-refresh

# Scheduled discovery + Pinterest taste sync.
#
# Discovery now runs IN THE RUNNER (not via the Vercel route) so it isn't bound by
# Vercel's 60s function cap — DISCOVERY_EMBED_CAP can be large and the feed's
# supply keeps up with browsing. Embedding still happens on the HF Space; the
# runner just orchestrates + writes to Supabase directly.
#
# Repo secrets required for discovery (the app's server env):
#   NEXT_PUBLIC_SUPABASE_URL   SUPABASE_SECRET_KEY   EMBED_ENDPOINT   EMBED_TOKEN
# Optional: EUROPEANA_KEY, SMITHSONIAN_API_KEY, RSS_FEEDS, DISCOVERY_PROXY_URL.
# Still used by the Pinterest/recluster steps: APP_URL, CRON_SECRET.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6h (00/06/12/18 UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Discover (off-Vercel, large batch)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          EMBED_ENDPOINT: ${{ secrets.EMBED_ENDPOINT }}
          EMBED_TOKEN: ${{ secrets.EMBED_TOKEN }}
          EUROPEANA_KEY: ${{ secrets.EUROPEANA_KEY }}
          SMITHSONIAN_API_KEY: ${{ secrets.SMITHSONIAN_API_KEY }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
          DISCOVERY_PROXY_URL: ${{ secrets.DISCOVERY_PROXY_URL }}
          # No 60s cap here → embed a lot more per run than the Vercel route can.
          DISCOVERY_EMBED_CAP: "500"
        # Sweep the open sources; each is isolated (a failure is logged, not fatal).
        run: npm run discover -- arena openverse artic metmuseum wikimedia cleveland nasa europeana smithsonian rss

      - name: Sync Pinterest saved pins (taste signal)
        run: |
          code=$(curl -sSL -o /tmp/sync.json -w "%{http_code}" -X POST "${APP_URL%/}/api/pinterest/sync" \
            -H "Authorization: Bearer $CRON_SECRET")
          cat /tmp/sync.json; echo
          # 409 = Pinterest not connected yet → not a failure, just skip.
          if [ "$code" = "409" ]; then echo "Pinterest not connected — skipping"; exit 0; fi
          if [ "$code" -ge 400 ]; then echo "Pinterest sync failed (HTTP $code)"; exit 1; fi

      - name: Recompute taste centroids
        run: |
          # 422 when there aren't enough taste embeddings yet — tolerate it.
          curl -sSL -X POST "${APP_URL%/}/api/recluster" -H "Authorization: Bearer $CRON_SECRET" | cat; echo
